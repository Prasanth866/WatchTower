services:
  postgres:
    image: postgres:16-alpine
    container_name: watchtower_postgres
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me_in_prod}
      - POSTGRES_DB=${POSTGRES_DB:-mydb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build: ./backend
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL
      - REDIS_URL
      - SQLALCHEMY_ECHO
      - SECRET_KEY
      - ACCESS_TOKEN_EXPIRE_MINUTES
      - ALGORITHM
      - CORS_ALLOWED_ORIGINS
      - BREVO_API_KEY
      - BREVO_FROM_EMAIL
      - BREVO_SENDER_NAME
      - EMAIL_FROM
      - ENABLE_WORKERS=${ENABLE_WORKERS:-true}
      - SKIP_MIGRATIONS=${SKIP_MIGRATIONS:-false}
    command: /backend/scripts/entrypoint.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
